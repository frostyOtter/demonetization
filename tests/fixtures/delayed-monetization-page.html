<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Delayed Monetization Fixture</title>
  </head>
  <body>
    <main id="article">
      <p>Delayed insertion fixture.</p>
    </main>
    <div id="delayed-class-placeholder" class="placeholder-dialog">Delayed class mutation placeholder</div>
    <script>
      setTimeout(function insertDelayedMonetizationDialog() {
        document.body.style.overflow = "hidden";
        var wrapper = document.createElement("section");
        wrapper.innerHTML = [
          '<div class="fc-monetization-dialog-container">Delayed monetization dialog</div>',
          '<div class="site-paywall-modal">Delayed configured keyword dialog</div>'
        ].join("");
        document.body.appendChild(wrapper);
      }, 100);

      setTimeout(function mutateDelayedMonetizationClass() {
        document.body.style.overflow = "hidden";
        document.getElementById("delayed-class-placeholder").className = "fc-monetization-dialog-container";
      }, 100);
    </script>
  </body>
</html>
